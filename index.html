<script>
document.addEventListener('DOMContentLoaded', () => {

  const gallery = document.querySelector('.gallery');
  const projects = document.querySelectorAll('.project');
  const buttons = document.querySelectorAll('.filters button');

  /* =========================
     FILTER SYSTEM
  ========================= */

  function showCategory(category, event = null) {

    // active button
    if (event) {
      buttons.forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    // sketch mode toggle
    if (category === 'sketchbook') {
      gallery.classList.add('sketch-mode');
      requestAnimationFrame(resizeMasonry);
    } else {
      gallery.classList.remove('sketch-mode');
    }

    // filter logic
    projects.forEach(project => {
      project.classList.remove('hide');

      if (category === 'all') {
        if (project.classList.contains('only-sketchbook')) {
          project.classList.add('hide');
        }
      } else {
        if (!project.classList.contains(category)) {
          project.classList.add('hide');
        }
      }
    });

    // re-layout sketchbook if needed
    if (category === 'sketchbook') {
      setTimeout(resizeMasonry, 100);
    }
  }

  window.showCategory = showCategory;

  showCategory('all');


  /* =========================
     LIGHTBOX SKETCHBOOK (FIXED BEHAVIOR)
  ========================= */

 const sketchItems = document.querySelectorAll('.project.sketchbook');
const lightbox = document.getElementById('sketch-lightbox');
const lightboxImg = document.getElementById('sketch-lightbox-img');

let activeItem = null;

sketchItems.forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();

    if (item.classList.contains('hide')) return;

    const img = item.querySelector('img');
    if (!img) return;

    // toggle
    if (activeItem === item) {
      closeLightbox();
      return;
    }

    openLightbox(img.src, item);
  });
});

function openLightbox(src, item) {
  lightbox.style.display = 'flex';
  lightboxImg.src = src;
  activeItem = item;

  // blocca scroll pagina (IMPORTANTE)
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.style.display = 'none';
  lightboxImg.src = '';
  activeItem = null;

  document.body.style.overflow = '';
}

lightbox.addEventListener('click', closeLightbox);

  /* =========================
     MASONRY ENGINE (SAFE)
  ========================= */

  function resizeMasonry() {
    const grid = document.querySelector('.gallery.sketch-mode');
    if (!grid) return;

    const rowHeight = 10;
    const items = grid.querySelectorAll('.project.sketchbook:not(.hide)');

    items.forEach(item => {
      const img = item.querySelector('img');
      if (!img) return;

      const height = item.getBoundingClientRect().height;
      const span = Math.ceil(height / rowHeight);

      item.style.gridRowEnd = "span " + span;
    });
  }

  window.addEventListener('load', resizeMasonry);
  window.addEventListener('resize', resizeMasonry);

});
</script>
