<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matteotti Centenary Posters</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">

  <a href="index.html" class="logo">
    <img src="images/logosirio.png" alt="Alessandro Sirio Ceresa">
  </a>

  <nav class="nav">
    <a href="about.html">About</a>
    <a href="contact.html">Contacts</a>
  </nav>

</header>

<!-- HERO -->
<section class="project-hero">
  <img src="100MATTEOTTI/heromatteotti.jpg" alt="Matteotti Poster Project">
</section>

<!-- PROJECT -->
<section class="project-page">

  <div class="project-container">

    <!-- INTRO -->
    <div class="project-intro">

      <div>
        <span>Year</span>
        <p>2024</p>
      </div>

      <div>
        <span>Role</span>
        <p>Art Direction, Poster Design</p>
      </div>

      <div>
        <span>Tools</span>
        <p>Illustrator, Photoshop, Procreate</p>
      </div>

    </div>

       <!-- CONTENT-->
    <div class="case-content">
    <div class="case-gallery is-banner">
    <img src="100MATTEOTTI/matteotti page.jpg">
     </div>
     </div>
    </section>

<!-- FOOTER -->
<footer class="footer">

  <div class="left">
    Alessandro Sirio Ceresa — Credits © 2026
  </div>

  <div class="right">

    <a href="https://www.instagram.com/artofsirio/" target="_blank">
      Instagram
    </a>

    <a href="https://www.linkedin.com/" target="_blank">
      LinkedIn
    </a>

    <a href="https://www.artstation.com/" target="_blank">
      ArtStation
    </a>

  </div>

</footer>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <img id="lightbox-img" alt="">
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const images = document.querySelectorAll('.gallery-img, .full-project-img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  images.forEach(img => {

    img.addEventListener('click', () => {

      lightbox.style.display = 'flex';
      lightboxImg.src = img.src;

    });

  });

  lightbox.addEventListener('click', () => {

    lightbox.style.display = 'none';
    lightboxImg.src = '';

  });

});

</script>

</body>
</html>
